monitor=,preferred,auto,auto

exec-once = eww daemon
exec-once = eww open bar
blurls=gtk-layer-shell
exec-once = mpvpaper '*'  .wallpaper.mp4 -o "--loop" & mako

$terminal = alacritty
$fileManager = nemo
$menu = nwg-drawer -i Reversal -fm nemo
$screenshot = grim -g "$(slurp)"

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
		disable_while_typing = yes
		tap-and-drag = yes
    }

    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(0000009D) rgba(d2d2d2ef) 40deg
    col.inactive_border = rgba(0000009D)

    layout = dwindle

    allow_tearing = false
}

decoration {

    rounding = 10
    
    blur {
        enabled = true
        size = 20
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1
	bezier = neonborder, -5, -5, -5, -5
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 50, neonborder,loop
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, myBezier,  slidevert
}

dwindle {
    pseudotile = yes
	preserve_split = yes
}

gestures {
    workspace_swipe = on
}

misc {
    force_default_wallpaper = 0
}


# 
windowrule = workspace 1, ^(firefox)$
windowrule = workspace 2, ^(org.telegram.desktop)$
windowrule = workspace 3, ^(Alacritty)$
windowrule = workspace 4, ^(steam)$
windowrule = workspace 4, ^(tl)$
windowrule = workspace 5, ^(libreoffice)$
windowrulev2 = nomaximizerequest, class:.* 

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, S, togglefloating, 
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, V, togglespecialworkspace, magic
bind = $mainMod SHIFT, V, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMode, Print, exec, $screenshot

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel=, XF86AudioRaiseVolume, exec, pamixer -i 5
bindel=, XF86AudioLowerVolume, exec, pamixer -d 5
bindel=, XF86AudioMute, exec, pamixer -t

exec-once = firefox & telegram-desktop & alacritty 
